name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build
      - name: Compose file must declare named volume
        run: grep -q "app_data:" docker-compose.yml
